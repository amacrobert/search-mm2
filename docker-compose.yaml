services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: searchmm2
      POSTGRES_PASSWORD: searchmm2
      POSTGRES_DB: searchmm2
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchmm2"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://searchmm2:searchmm2@db:5432/searchmm2?sslmode=disable
      JWT_SECRET: dev-secret-change-me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      PORT: "8080"
      SCRAPE_INTERVAL: 30m

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://backend:8080

volumes:
  pgdata:
  frontend_node_modules:
